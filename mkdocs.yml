site_name: AnaPPTAgent
site_description: >-
  Analysis report writing and PPT auto-generation agent tool —
  from raw data to slide deck, fully automated.
site_url: https://sidneylyzhang.github.io/AnaPPTAgent/
repo_url: https://github.com/SidneyLYZhang/AnaPPTAgent
repo_name: SidneyLYZhang/AnaPPTAgent
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/chart-box

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SidneyLYZhang/AnaPPTAgent
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/anappt/
  generator: false

plugins:
  - search
  - include-markdown
  - i18n:
      default_language: zh
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
        - locale: en
          name: English
          build: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - README:
      - English: README_en.md
      - 中文: README_zh.md
  - Installation: installation.md
  - Usage Guide:
      - CLI: cli-usage.md
      - Interactive TUI: tui-usage.md
  - Workflow:
      - Report Generation (S1-S5): report-workflow.md
      - PPT Generation (S6): ppt-workflow.md
